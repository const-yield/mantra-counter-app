<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<title>每日报数</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root {
  --page: #f9f9f7; --surface: #fcfcfb;
  --ink-1: #0b0b0b; --ink-2: #52514e; --ink-3: #898781;
  --border: rgba(11,11,11,0.10); --hairline: #e1e0d9;
  --accent: #2a78d6; --accent-ink: #ffffff; --chip: #e8f0fb; --chip-ink: #1c5cab;
  --warn-bg: #fdf3e0; --warn-ink: #8a5a00;
}
@media (prefers-color-scheme: dark) {
  :root {
    --page: #0d0d0d; --surface: #1a1a19;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
    --border: rgba(255,255,255,0.10); --hairline: #2c2c2a;
    --accent: #3987e5; --accent-ink: #ffffff; --chip: #10315c; --chip-ink: #9ec5f4;
    --warn-bg: #3a2c10; --warn-ink: #f0c060;
  }
}
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--page); color: var(--ink-1);
  font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
  font-size: 15px; padding: 14px 12px 96px; max-width: 560px; margin: 0 auto;
}
header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
h1 { font-size: 17px; font-weight: 650; }
#dateLabel { color: var(--ink-3); font-size: 12px; }
#grandTotal { font-size: 13px; color: var(--ink-2); white-space: nowrap; }
#grandTotal b { font-size: 17px; }
#syncBar {
  font-size: 12px; border-radius: 8px; padding: 6px 10px; margin-bottom: 10px;
  color: var(--ink-3); display: flex; justify-content: space-between; align-items: center;
}
#syncBar.pending { background: var(--warn-bg); color: var(--warn-ink); }
#syncBar button {
  font: inherit; border: none; background: transparent; color: inherit;
  text-decoration: underline; padding: 0; min-width: 0; flex: none; font-weight: 600; cursor: pointer;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
}
.cat-card { cursor: pointer; }
.cat-card:active { transform: scale(0.99); }
.cat-head { display: flex; justify-content: space-between; align-items: baseline; }
.cat-name { font-weight: 600; display: flex; align-items: center; gap: 8px; min-width: 0; }
.badge {
  font-size: 11px; font-weight: 500; color: var(--accent);
  border: 1px solid var(--accent); border-radius: 6px; padding: 0 6px;
  white-space: nowrap; flex: none;
}
.cat-cum { font-size: 12px; color: var(--ink-3); margin-top: 2px; font-variant-numeric: tabular-nums; }
.cat-total { font-variant-numeric: tabular-nums; color: var(--ink-2); font-size: 14px; white-space: nowrap; }
.cat-total b { color: var(--ink-1); font-size: 16px; }
.cat-total .chev { color: var(--ink-3); margin-left: 6px; }
button {
  font: inherit; border: none; cursor: pointer; border-radius: 10px;
  padding: 10px 0; font-weight: 600; font-size: 15px;
  background: var(--chip); color: var(--chip-ink);
}
button:active { transform: scale(0.96); opacity: 0.85; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
h2 { font-size: 13px; color: var(--ink-2); font-weight: 600; margin-bottom: 8px; }
.recent-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--ink-2); padding: 2px 0; }
.recent-right { display: flex; align-items: center; gap: 10px; }
.recent-row .t { color: var(--ink-3); }
.row-del {
  background: transparent; border: 1px solid var(--hairline); color: var(--ink-3);
  font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: 7px;
}
.row-del.armed { border-color: #d03b3b; color: #d03b3b; }
#summaryText {
  width: 100%; font: inherit; font-size: 13px; line-height: 1.6;
  background: transparent; color: var(--ink-2); border: none; resize: none;
}
.foot-actions { display: flex; gap: 8px; margin-top: 8px; }
.foot-actions button { flex: 1; background: var(--accent); color: var(--accent-ink); }
.setup label { display: block; font-size: 13px; color: var(--ink-2); margin: 10px 0 4px; }
.setup input { width: 100%; }
.setup .go { width: 100%; margin-top: 14px; background: var(--accent); color: var(--accent-ink); }
.setup .hint { font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
#settingsBtn {
  background: transparent; border: none; color: var(--ink-3);
  padding: 0 0 0 10px; font-size: 16px; font-weight: 400;
}
/* 报数页 */
.input-field, .setup input {
  width: 100%; min-width: 0; font: inherit; font-size: 16px; padding: 10px 12px;
  border: 1px solid var(--hairline); border-radius: 10px;
  background: var(--surface); color: var(--ink-1);
}
.chip-cloud { display: flex; flex-wrap: wrap; gap: 10px; }
.cat-chip {
  background: transparent; border: 1px solid var(--hairline); color: var(--ink-1);
  border-radius: 18px; padding: 8px 14px; font-weight: 500; font-size: 14px;
}
.cat-chip.selected { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
.quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.quick-chips button { flex: 1 1 72px; min-width: 72px; }
.input-actions { display: flex; gap: 10px; margin-top: 4px; }
.input-actions .ghost { flex: 0 0 96px; background: transparent; border: 1px solid var(--hairline); color: var(--ink-2); font-weight: 500; }
.input-actions #submitEntry { flex: 1; background: var(--accent); color: var(--accent-ink); font-size: 16px; letter-spacing: 0.3em; text-indent: 0.3em; }
/* 底部固定报数按钮 */
#fabBar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 5;
  max-width: 560px; margin: 0 auto;
  padding: 18px 12px calc(12px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--page) 65%, transparent);
}
#fabBar button {
  width: 100%; background: var(--accent); color: var(--accent-ink);
  padding: 13px 0; font-size: 16px; border-radius: 12px; letter-spacing: 0.3em; text-indent: 0.3em;
}
#toast {
  position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
  background: var(--ink-1); color: var(--page); padding: 8px 16px;
  border-radius: 20px; font-size: 13px; display: none; z-index: 10; max-width: 90vw;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <div><h1>每日报数</h1><div id="dateLabel"></div></div>
  <div style="display:flex;align-items:baseline">
    <div id="grandTotal"></div>
    <button id="settingsBtn" title="设置">⚙</button>
  </div>
</header>

<div id="syncBar"></div>

<div class="card setup hidden" id="setupCard">
  <h2>连接到你的 Google 表格</h2>
  <label>Apps Script 网址(以 /exec 结尾)</label>
  <input id="cfgUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec">
  <label>访问令牌</label>
  <input id="cfgToken" type="text" autocomplete="off" placeholder="Code.gs 里的 TOKEN">
  <button class="go" id="cfgSave">保存并连接</button>
  <div class="hint">部署方法见仓库里的 README。配置只保存在本机浏览器里,不会上传到任何地方。</div>
</div>

<!-- 主界面: 概览 -->
<div id="main" class="hidden">
  <div id="cats"></div>

  <div class="card" id="recentCard" style="display:none">
    <h2>今天最近几笔(✕ 可删除)</h2>
    <div id="recentList"></div>
  </div>

  <div class="card" id="summaryCard" style="display:none">
    <h2>今日汇总</h2>
    <textarea id="summaryText" rows="4" readonly></textarea>
    <div class="foot-actions">
      <button id="copyBtn">复制汇总</button>
    </div>
  </div>
</div>

<!-- 报数页: 输入集中在一处 -->
<div id="inputView" class="hidden">
  <div class="card">
    <h2>记录时间(可修改,用于补报)</h2>
    <input type="date" id="entryDate" class="input-field">
  </div>
  <div class="card">
    <h2>报数功课</h2>
    <div id="catChips" class="chip-cloud"></div>
  </div>
  <div class="card">
    <h2>报数数值</h2>
    <input type="number" id="entryCount" class="input-field" min="1" inputmode="numeric" placeholder="请输入数字,或点下面的常用数量">
    <div id="quickChips" class="quick-chips"></div>
  </div>
  <div class="input-actions">
    <button id="backBtn" class="ghost">返回</button>
    <button id="submitEntry">报数</button>
  </div>
</div>

<div id="fabBar" class="hidden"><button id="fabBtn">报数</button></div>

<div id="toast"></div>

<script>
'use strict';

// ---------- 本地存储 ----------
function load(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }

var cfg = load('bs_cfg', null);          // {url, token}
var server = load('bs_server', null);    // 上次成功拉到的服务端状态
var queue = load('bs_queue', []);        // 未同步的记数 [{id, cat, count, ts, date}]
var syncing = false;
var selectedCat = null;

function $(id) { return document.getElementById(id); }

function toast(msg) {
  var t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toast._h);
  toast._h = setTimeout(function () { t.style.display = 'none'; }, 1800);
}

// ---------- 日期(北京时间) ----------
function dateKeyOf(ms) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai' })
    .format(new Date(ms)).replace(/-/g, '/');
}
function todayKey() { return dateKeyOf(Date.now()); }
function timeOf(ms) {
  return new Intl.DateTimeFormat('zh-CN', { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', hour12: false })
    .format(new Date(ms));
}

// ---------- API ----------
function api(action, payload) {
  var body = Object.assign({ token: cfg.token, action: action }, payload || {});
  return fetch(cfg.url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免 CORS 预检
    body: JSON.stringify(body),
  }).then(function (r) { return r.json(); }).then(function (res) {
    if (!res.ok) throw new Error(res.error || '服务端错误');
    return res;
  });
}

// ---------- 状态合成: 服务端已同步 + 本地待同步 ----------
function entryDate(q) { return q.date || dateKeyOf(q.ts); }

function effective() {
  var today = todayKey();
  var totals = {};
  if (server && server.date === today) {
    Object.keys(server.totals).forEach(function (k) { totals[k] = server.totals[k]; });
  }
  queue.forEach(function (q) {
    if (entryDate(q) === today) totals[q.cat] = (totals[q.cat] || 0) + q.count;
  });

  var recent = [];
  for (var i = queue.length - 1; i >= 0 && recent.length < 6; i--) {
    if (entryDate(queue[i]) === today) {
      recent.push({ id: queue[i].id, time: timeOf(queue[i].ts), cat: queue[i].cat, count: queue[i].count, pending: true });
    }
  }
  if (server && server.date === today) {
    server.recent.forEach(function (r) {
      if (recent.length < 6) recent.push(r);
    });
  }

  // 累计 = 服务端累计(历史基数+已同步) + 本地待同步
  var cum = {};
  if (server && server.cum) {
    Object.keys(server.cum).forEach(function (k) { cum[k] = server.cum[k]; });
  }
  queue.forEach(function (q) { cum[q.cat] = (cum[q.cat] || 0) + q.count; });

  return { totals: totals, recent: recent, cum: cum, categories: (server && server.categories) || [] };
}

// ---------- 渲染 ----------
function renderSyncBar() {
  var bar = $('syncBar');
  bar.replaceChildren();
  if (!navigator.onLine) {
    bar.className = queue.length ? 'pending' : '';
    bar.appendChild(document.createTextNode(
      queue.length ? '离线中,' + queue.length + ' 笔已存手机,恢复网络后自动同步' : '离线中,记数会先存在手机里'));
  } else if (queue.length) {
    bar.className = 'pending';
    bar.appendChild(document.createTextNode(queue.length + ' 笔待同步 '));
    var btn = document.createElement('button');
    btn.textContent = '立即同步';
    btn.onclick = function () { flush(); };
    bar.appendChild(btn);
  } else {
    bar.className = '';
    bar.appendChild(document.createTextNode(syncing ? '同步中…' : '已同步到 Google 表格'));
  }
}

function buildCard(c, s) {
  var card = document.createElement('div'); card.className = 'card cat-card';
  var todayCount = s.totals[c.name] || 0;

  var head = document.createElement('div'); head.className = 'cat-head';
  var name = document.createElement('div'); name.className = 'cat-name';
  var nameText = document.createElement('span'); nameText.textContent = c.name;
  name.appendChild(nameText);
  if (todayCount > 0) {
    var badge = document.createElement('span'); badge.className = 'badge';
    badge.textContent = '已报数';
    name.appendChild(badge);
  }
  var total = document.createElement('div'); total.className = 'cat-total';
  var tb = document.createElement('b'); tb.textContent = todayCount.toLocaleString();
  total.appendChild(document.createTextNode('今日 ')); total.appendChild(tb);
  var chev = document.createElement('span'); chev.className = 'chev'; chev.textContent = '›';
  total.appendChild(chev);
  head.appendChild(name); head.appendChild(total);
  card.appendChild(head);

  var cum = document.createElement('div'); cum.className = 'cat-cum';
  cum.textContent = '累计 ' + (s.cum[c.name] || 0).toLocaleString();
  card.appendChild(cum);

  card.onclick = function () { showInput(c.name); };
  return card;
}

function render() {
  var s = effective();
  var today = todayKey();
  var parts = today.split('/');
  $('dateLabel').textContent = parts[1] + '月' + parts[2] + '日';

  var grand = 0;
  Object.keys(s.totals).forEach(function (k) { grand += s.totals[k]; });
  var gt = $('grandTotal');
  gt.replaceChildren();
  gt.appendChild(document.createTextNode('今日合计 '));
  var b = document.createElement('b');
  b.textContent = grand.toLocaleString();
  gt.appendChild(b);

  renderSyncBar();

  var root = $('cats');
  root.replaceChildren();
  s.categories.forEach(function (c) { root.appendChild(buildCard(c, s)); });

  renderLists(s);
}

function renderLists(s) {
  $('recentCard').style.display = s.recent.length ? '' : 'none';
  var list = $('recentList');
  list.replaceChildren();
  s.recent.forEach(function (r) {
    var row = document.createElement('div'); row.className = 'recent-row';
    var left = document.createElement('span');
    left.textContent = r.cat + ' +' + r.count.toLocaleString() + (r.pending ? ' ⏳' : '');
    var right = document.createElement('span'); right.className = 'recent-right';
    var t = document.createElement('span'); t.className = 't'; t.textContent = r.time;
    var del = document.createElement('button'); del.className = 'row-del'; del.textContent = '✕';
    del.onclick = function (evt) {
      evt.stopPropagation();
      if (!del.dataset.armed) {
        del.dataset.armed = '1';
        del.classList.add('armed');
        del.textContent = '确认删除';
        setTimeout(function () {
          delete del.dataset.armed;
          del.classList.remove('armed');
          del.textContent = '✕';
        }, 3000);
        return;
      }
      deleteEntry(r);
    };
    right.appendChild(t); right.appendChild(del);
    row.appendChild(left); row.appendChild(right);
    list.appendChild(row);
  });

  var lines = [];
  s.categories.forEach(function (c) {
    if (s.totals[c.name]) lines.push(c.name + ' ' + s.totals[c.name]);
  });
  Object.keys(s.totals).forEach(function (k) {
    var known = s.categories.some(function (c) { return c.name === k; });
    if (!known && s.totals[k]) lines.push(k + ' ' + s.totals[k]);
  });
  $('summaryCard').style.display = lines.length ? '' : 'none';
  var ta = $('summaryText');
  ta.value = lines.join('\n');
  ta.rows = Math.max(3, lines.length);
}

// ---------- 报数页 ----------
function showInput(catName) {
  var s = effective();
  if (!s.categories.length) { toast('功课列表还没同步,请先联网打开一次'); return; }
  if (catName) selectedCat = catName;
  if (!selectedCat || !s.categories.some(function (c) { return c.name === selectedCat; })) {
    selectedCat = s.categories[0].name;
  }
  var t = todayKey().split('/');
  $('entryDate').value = t[0] + '-' + t[1] + '-' + t[2];
  $('entryCount').value = '';
  renderInputView();
  $('main').classList.add('hidden');
  $('fabBar').classList.add('hidden');
  $('inputView').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function renderInputView() {
  var s = effective();
  var cloud = $('catChips');
  cloud.replaceChildren();
  s.categories.forEach(function (c) {
    var chip = document.createElement('button');
    chip.className = 'cat-chip' + (c.name === selectedCat ? ' selected' : '');
    chip.textContent = c.name;
    chip.onclick = function () { selectedCat = c.name; renderInputView(); };
    cloud.appendChild(chip);
  });

  var qc = $('quickChips');
  qc.replaceChildren();
  var cat = null;
  s.categories.forEach(function (c) { if (c.name === selectedCat) cat = c; });
  ((cat && cat.quick) || []).forEach(function (v) {
    var btn = document.createElement('button');
    btn.textContent = v.toLocaleString();
    btn.onclick = function () { $('entryCount').value = v; };
    qc.appendChild(btn);
  });
}

function showHome() {
  $('inputView').classList.add('hidden');
  $('main').classList.remove('hidden');
  $('fabBar').classList.remove('hidden');
  render();
  window.scrollTo(0, 0);
}

$('fabBtn').onclick = function () { showInput(); };
$('backBtn').onclick = showHome;
$('submitEntry').onclick = function () {
  var v = parseInt($('entryCount').value, 10);
  if (!selectedCat) { toast('请先选择功课'); return; }
  if (!v || v <= 0) { toast('请输入正整数'); return; }
  var dv = $('entryDate').value; // yyyy-mm-dd
  var dateKey = /^\d{4}-\d{2}-\d{2}$/.test(dv) ? dv.replace(/-/g, '/') : todayKey();
  add(selectedCat, v, dateKey);
  showHome();
};

// ---------- 记数与同步 ----------
function newId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}

function add(cat, n, dateKey) {
  queue.push({ id: newId(), cat: cat, count: n, ts: Date.now(), date: dateKey || todayKey() });
  save('bs_queue', queue);
  var suffix = (dateKey && dateKey !== todayKey()) ? '(' + dateKey + ')' : '';
  toast(cat + ' +' + n.toLocaleString() + suffix);
  render();
  flush();
}

function flush() {
  if (syncing || !navigator.onLine || !cfg) return;
  if (!queue.length) { refreshState(); return; }
  syncing = true;
  renderSyncBar();
  var batch = queue.slice(0, 100);
  api('batch', { entries: batch })
    .then(function (res) {
      var acked = {};
      (res.acked || []).forEach(function (id) { acked[id] = true; });
      queue = queue.filter(function (q) { return !acked[q.id]; });
      save('bs_queue', queue);
      server = res; save('bs_server', server);
      syncing = false;
      render();
      if (queue.length) flush();
    })
    .catch(function (err) {
      syncing = false;
      renderSyncBar();
      console.error(err);
    });
}

function refreshState() {
  if (!navigator.onLine || !cfg || syncing) return;
  api('state').then(function (res) {
    server = res; save('bs_server', server);
    render();
  }).catch(function (err) { console.error(err); });
}

// ---------- 删除任意一笔 ----------
function deleteEntry(r) {
  if (r.pending) {
    // 还没同步出去,直接从本地队列删掉
    queue = queue.filter(function (q) { return q.id !== r.id; });
    save('bs_queue', queue);
    toast('已删除');
    render();
  } else if (navigator.onLine) {
    api('delete', { id: r.id }).then(function (res) {
      server = res; save('bs_server', server);
      toast('已删除');
      render();
    }).catch(function () { toast('删除失败,请重试'); });
  } else {
    toast('这笔已同步,需要有网络才能删除');
  }
}

// ---------- 复制汇总 ----------
$('copyBtn').onclick = function () {
  var ta = $('summaryText');
  var done = function () { toast('已复制'); };
  var fallback = function () {
    ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
    try { document.execCommand('copy'); done(); }
    catch (e) { toast('请长按文本框手动复制'); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(done, fallback);
  } else {
    fallback();
  }
};

// ---------- 设置 ----------
function showSetup() {
  $('setupCard').classList.remove('hidden');
  $('main').classList.add('hidden');
  $('inputView').classList.add('hidden');
  $('fabBar').classList.add('hidden');
  if (cfg) { $('cfgUrl').value = cfg.url; $('cfgToken').value = cfg.token; }
}
$('settingsBtn').onclick = showSetup;
$('cfgSave').onclick = function () {
  var url = $('cfgUrl').value.trim();
  var token = $('cfgToken').value.trim();
  if (!/^https:\/\/script\.google\.com\/.+\/exec$/.test(url)) { toast('网址应以 /exec 结尾'); return; }
  if (!token) { toast('请填写访问令牌'); return; }
  cfg = { url: url, token: token };
  $('cfgSave').textContent = '连接中…';
  api('state').then(function (res) {
    save('bs_cfg', cfg);
    server = res; save('bs_server', server);
    $('cfgSave').textContent = '保存并连接';
    $('setupCard').classList.add('hidden');
    showHome();
    flush();
    toast('连接成功');
  }).catch(function (err) {
    $('cfgSave').textContent = '保存并连接';
    toast('连接失败: ' + err.message);
  });
};

// ---------- 启动 ----------
window.addEventListener('online', function () { render(); flush(); });
window.addEventListener('offline', render);
// 午夜跨天时自动刷新界面
setInterval(function () {
  if (render._day !== todayKey()) { render._day = todayKey(); render(); }
}, 30 * 1000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW 注册失败', e); });
}

if (!cfg) {
  showSetup();
} else {
  showHome();
  flush();
}
</script>
</body>
</html>
