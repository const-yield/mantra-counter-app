<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<title>每日报数</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root {
  --page: #f9f9f7; --surface: #fcfcfb;
  --ink-1: #0b0b0b; --ink-2: #52514e; --ink-3: #898781;
  --border: rgba(11,11,11,0.10); --hairline: #e1e0d9;
  --accent: #2a78d6; --accent-ink: #ffffff; --chip: #e8f0fb; --chip-ink: #1c5cab;
  --warn-bg: #fdf3e0; --warn-ink: #8a5a00;
}
@media (prefers-color-scheme: dark) {
  :root {
    --page: #0d0d0d; --surface: #1a1a19;
    --ink-1: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
    --border: rgba(255,255,255,0.10); --hairline: #2c2c2a;
    --accent: #3987e5; --accent-ink: #ffffff; --chip: #10315c; --chip-ink: #9ec5f4;
    --warn-bg: #3a2c10; --warn-ink: #f0c060;
  }
}
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--page); color: var(--ink-1);
  font-family: system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
  font-size: 15px; padding: 14px 12px 90px; max-width: 560px; margin: 0 auto;
}
header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
h1 { font-size: 17px; font-weight: 650; }
#dateLabel { color: var(--ink-3); font-size: 12px; }
#grandTotal { font-size: 13px; color: var(--ink-2); white-space: nowrap; }
#grandTotal b { font-size: 17px; }
#syncBar {
  font-size: 12px; border-radius: 8px; padding: 6px 10px; margin-bottom: 10px;
  color: var(--ink-3); display: flex; justify-content: space-between; align-items: center;
}
#syncBar.pending { background: var(--warn-bg); color: var(--warn-ink); }
#syncBar button {
  font: inherit; border: none; background: transparent; color: inherit;
  text-decoration: underline; padding: 0; min-width: 0; flex: none; font-weight: 600; cursor: pointer;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
}
.group-head {
  display: flex; align-items: baseline; gap: 6px;
  padding: 12px 4px 6px; cursor: pointer; user-select: none;
}
.group-head .chev { color: var(--ink-3); font-size: 11px; width: 12px; }
.group-head .g-name { font-size: 13px; font-weight: 650; color: var(--ink-2); letter-spacing: 0.02em; }
.group-head .g-sub { margin-left: auto; font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
.group-head .g-sub b { color: var(--ink-2); }
.cat-head { display: flex; justify-content: space-between; align-items: baseline; }
.cat-name { font-weight: 600; }
.cat-total { font-variant-numeric: tabular-nums; color: var(--ink-2); font-size: 14px; white-space: nowrap; }
.cat-total b { color: var(--ink-1); font-size: 16px; }
.chips { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
button {
  font: inherit; border: none; cursor: pointer; border-radius: 10px;
  padding: 10px 0; min-width: 72px; font-weight: 600; font-size: 15px;
  background: var(--chip); color: var(--chip-ink);
  flex: 1 1 72px;
}
button:active { transform: scale(0.96); opacity: 0.85; }
button.custom { background: transparent; border: 1px solid var(--hairline); color: var(--ink-2); flex: 0 0 52px; min-width: 52px; }
.custom-row { display: none; gap: 8px; margin-top: 8px; }
.custom-row.open { display: flex; }
.custom-row input, .setup input {
  flex: 1; min-width: 0; font: inherit; font-size: 16px; padding: 9px 12px;
  border: 1px solid var(--hairline); border-radius: 10px;
  background: var(--surface); color: var(--ink-1);
}
.custom-row button { flex: 0 0 88px; background: var(--accent); color: var(--accent-ink); }
#recentCard h2, #summaryCard h2, .setup h2 { font-size: 13px; color: var(--ink-2); font-weight: 600; margin-bottom: 8px; }
.recent-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--ink-2); padding: 3px 0; }
.recent-row .t { color: var(--ink-3); }
#undoBtn { width: 100%; margin-top: 8px; background: transparent; border: 1px solid var(--hairline); color: var(--ink-2); font-weight: 500; }
#summaryText {
  width: 100%; font: inherit; font-size: 13px; line-height: 1.6;
  background: transparent; color: var(--ink-2); border: none; resize: none;
}
.foot-actions { display: flex; gap: 8px; margin-top: 8px; }
.foot-actions button { background: var(--accent); color: var(--accent-ink); }
.setup label { display: block; font-size: 13px; color: var(--ink-2); margin: 10px 0 4px; }
.setup input { width: 100%; }
.setup .go { width: 100%; margin-top: 14px; background: var(--accent); color: var(--accent-ink); }
.setup .hint { font-size: 12px; color: var(--ink-3); margin-top: 10px; line-height: 1.6; }
#settingsBtn {
  background: transparent; border: none; color: var(--ink-3); flex: none;
  min-width: 0; padding: 0 0 0 10px; font-size: 16px; font-weight: 400;
}
#toast {
  position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
  background: var(--ink-1); color: var(--page); padding: 8px 16px;
  border-radius: 20px; font-size: 13px; display: none; z-index: 10; max-width: 90vw;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <div><h1>每日报数</h1><div id="dateLabel"></div></div>
  <div style="display:flex;align-items:baseline">
    <div id="grandTotal"></div>
    <button id="settingsBtn" title="设置">⚙</button>
  </div>
</header>

<div id="syncBar"></div>

<div class="card setup hidden" id="setupCard">
  <h2>连接到你的 Google 表格</h2>
  <label>Apps Script 网址(以 /exec 结尾)</label>
  <input id="cfgUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec">
  <label>访问令牌</label>
  <input id="cfgToken" type="text" autocomplete="off" placeholder="Code.gs 里的 TOKEN">
  <button class="go" id="cfgSave">保存并连接</button>
  <div class="hint">部署方法见仓库里的 README。配置只保存在本机浏览器里,不会上传到任何地方。</div>
</div>

<div id="main" class="hidden">
  <div id="cats"></div>

  <div class="card" id="recentCard" style="display:none">
    <h2>今天最近几笔</h2>
    <div id="recentList"></div>
    <button id="undoBtn">撤销最后一笔</button>
  </div>

  <div class="card" id="summaryCard" style="display:none">
    <h2>今日汇总</h2>
    <textarea id="summaryText" rows="4" readonly></textarea>
    <div class="foot-actions">
      <button id="copyBtn">复制汇总</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ---------- 本地存储 ----------
function load(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

var cfg = load('bs_cfg', null);          // {url, token}
var server = load('bs_server', null);    // 上次成功拉到的服务端状态
var queue = load('bs_queue', []);        // 未同步的记数 [{id, cat, count, ts}]
var syncing = false;

function $(id) { return document.getElementById(id); }

function toast(msg) {
  var t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toast._h);
  toast._h = setTimeout(function () { t.style.display = 'none'; }, 1800);
}

// ---------- 日期(北京时间) ----------
function dateKeyOf(ms) {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai' })
    .format(new Date(ms)).replace(/-/g, '/');
}
function todayKey() { return dateKeyOf(Date.now()); }
function timeOf(ms) {
  return new Intl.DateTimeFormat('zh-CN', { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', hour12: false })
    .format(new Date(ms));
}

// ---------- API ----------
function api(action, payload) {
  var body = Object.assign({ token: cfg.token, action: action }, payload || {});
  return fetch(cfg.url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 避免 CORS 预检
    body: JSON.stringify(body),
  }).then(function (r) { return r.json(); }).then(function (res) {
    if (!res.ok) throw new Error(res.error || '服务端错误');
    return res;
  });
}

// ---------- 状态合成: 服务端已同步 + 本地待同步 ----------
function effective() {
  var today = todayKey();
  var totals = {};
  if (server && server.date === today) {
    Object.keys(server.totals).forEach(function (k) { totals[k] = server.totals[k]; });
  }
  queue.forEach(function (q) {
    if (dateKeyOf(q.ts) === today) totals[q.cat] = (totals[q.cat] || 0) + q.count;
  });

  var recent = [];
  for (var i = queue.length - 1; i >= 0 && recent.length < 6; i--) {
    if (dateKeyOf(queue[i].ts) === today) {
      recent.push({ time: timeOf(queue[i].ts), cat: queue[i].cat, count: queue[i].count, pending: true });
    }
  }
  if (server && server.date === today) {
    server.recent.forEach(function (r) {
      if (recent.length < 6) recent.push(r);
    });
  }
  return { totals: totals, recent: recent, categories: (server && server.categories) || [] };
}

// ---------- 渲染 ----------
function renderSyncBar() {
  var bar = $('syncBar');
  bar.replaceChildren();
  if (!navigator.onLine) {
    bar.className = queue.length ? 'pending' : '';
    bar.appendChild(document.createTextNode(
      queue.length ? '离线中,' + queue.length + ' 笔已存手机,恢复网络后自动同步' : '离线中,记数会先存在手机里'));
  } else if (queue.length) {
    bar.className = 'pending';
    bar.appendChild(document.createTextNode(queue.length + ' 笔待同步 '));
    var btn = document.createElement('button');
    btn.textContent = '立即同步';
    btn.onclick = function () { flush(); };
    bar.appendChild(btn);
  } else {
    bar.className = '';
    bar.appendChild(document.createTextNode(syncing ? '同步中…' : '已同步到 Google 表格'));
  }
}

function render() {
  var s = effective();
  var today = todayKey();
  var parts = today.split('/');
  $('dateLabel').textContent = parts[1] + '月' + parts[2] + '日';

  var grand = 0;
  Object.keys(s.totals).forEach(function (k) { grand += s.totals[k]; });
  var gt = $('grandTotal');
  gt.replaceChildren();
  gt.appendChild(document.createTextNode('今日合计 '));
  var b = document.createElement('b');
  b.textContent = grand.toLocaleString();
  gt.appendChild(b);

  renderSyncBar();

  // 按「组别」列分组; 都没填组别时按原样平铺
  var groupOrder = [];
  var byGroup = {};
  s.categories.forEach(function (c) {
    var g = (c.group || '').trim();
    if (!(g in byGroup)) { byGroup[g] = []; groupOrder.push(g); }
    byGroup[g].push(c);
  });
  var grouped = groupOrder.some(function (g) { return g !== ''; });
  groupOrder.sort(function (a, b) { return (a === '' ? 1 : 0) - (b === '' ? 1 : 0); }); // 未分组的排最后
  var folds = load('bs_folds', {});

  var root = $('cats');
  root.replaceChildren();
  groupOrder.forEach(function (g) {
    var box = document.createElement('div');
    if (grouped) {
      var sub = 0;
      byGroup[g].forEach(function (c) { sub += s.totals[c.name] || 0; });
      var head = document.createElement('div'); head.className = 'group-head';
      var chev = document.createElement('span'); chev.className = 'chev';
      chev.textContent = folds[g] ? '▸' : '▾';
      var gname = document.createElement('span'); gname.className = 'g-name';
      gname.textContent = g || '其他';
      var gsub = document.createElement('span'); gsub.className = 'g-sub';
      var gb = document.createElement('b'); gb.textContent = sub.toLocaleString();
      gsub.appendChild(document.createTextNode('今日 ')); gsub.appendChild(gb);
      head.appendChild(chev); head.appendChild(gname); head.appendChild(gsub);
      head.onclick = function () {
        folds[g] = !folds[g];
        save('bs_folds', folds);
        render();
      };
      root.appendChild(head);
      if (folds[g]) return; // 折叠中,只显示组标题
    }
    byGroup[g].forEach(function (c) { box.appendChild(buildCard(c, s)); });
    root.appendChild(box);
  });

  renderLists(s);
}

function buildCard(c, s) {
    var card = document.createElement('div'); card.className = 'card';
    var head = document.createElement('div'); head.className = 'cat-head';
    var name = document.createElement('div'); name.className = 'cat-name'; name.textContent = c.name;
    var total = document.createElement('div'); total.className = 'cat-total';
    var tb = document.createElement('b'); tb.textContent = (s.totals[c.name] || 0).toLocaleString();
    total.appendChild(document.createTextNode('今日 ')); total.appendChild(tb);
    head.appendChild(name); head.appendChild(total);
    card.appendChild(head);

    var chips = document.createElement('div'); chips.className = 'chips';
    c.quick.forEach(function (v) {
      var btn = document.createElement('button');
      btn.textContent = '+' + v.toLocaleString();
      btn.onclick = function () { add(c.name, v); };
      chips.appendChild(btn);
    });
    var custom = document.createElement('button');
    custom.className = 'custom'; custom.textContent = '…';
    chips.appendChild(custom);
    card.appendChild(chips);

    var customRow = document.createElement('div'); customRow.className = 'custom-row';
    var input = document.createElement('input');
    input.type = 'number'; input.min = '1'; input.inputMode = 'numeric';
    input.placeholder = '输入数量';
    var ok = document.createElement('button'); ok.textContent = '记入';
    ok.onclick = function () {
      var v = parseInt(input.value, 10);
      if (!v || v <= 0) { toast('请输入正整数'); return; }
      input.value = '';
      add(c.name, v);
    };
    customRow.appendChild(input); customRow.appendChild(ok);
    card.appendChild(customRow);
    custom.onclick = function () {
      customRow.classList.toggle('open');
      if (customRow.classList.contains('open')) input.focus();
    };
    return card;
}

function renderLists(s) {
  $('recentCard').style.display = s.recent.length ? '' : 'none';
  var list = $('recentList');
  list.replaceChildren();
  s.recent.forEach(function (r) {
    var row = document.createElement('div'); row.className = 'recent-row';
    var left = document.createElement('span');
    left.textContent = r.cat + ' +' + r.count.toLocaleString() + (r.pending ? ' ⏳' : '');
    var right = document.createElement('span'); right.className = 't'; right.textContent = r.time;
    row.appendChild(left); row.appendChild(right);
    list.appendChild(row);
  });

  var lines = [];
  s.categories.forEach(function (c) {
    if (s.totals[c.name]) lines.push(c.name + ' ' + s.totals[c.name]);
  });
  Object.keys(s.totals).forEach(function (k) {
    var known = s.categories.some(function (c) { return c.name === k; });
    if (!known && s.totals[k]) lines.push(k + ' ' + s.totals[k]);
  });
  $('summaryCard').style.display = lines.length ? '' : 'none';
  var ta = $('summaryText');
  ta.value = lines.join('\n');
  ta.rows = Math.max(3, lines.length);
}

// ---------- 记数与同步 ----------
function newId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
}

function add(cat, n) {
  queue.push({ id: newId(), cat: cat, count: n, ts: Date.now() });
  save('bs_queue', queue);
  toast(cat + ' +' + n.toLocaleString());
  render();
  flush();
}

function flush() {
  if (syncing || !navigator.onLine || !cfg) return;
  if (!queue.length) { refreshState(); return; }
  syncing = true;
  renderSyncBar();
  var batch = queue.slice(0, 100);
  api('batch', { entries: batch })
    .then(function (res) {
      var acked = {};
      (res.acked || []).forEach(function (id) { acked[id] = true; });
      queue = queue.filter(function (q) { return !acked[q.id]; });
      save('bs_queue', queue);
      server = res; save('bs_server', server);
      syncing = false;
      render();
      if (queue.length) flush();
    })
    .catch(function (err) {
      syncing = false;
      renderSyncBar();
      console.error(err);
    });
}

function refreshState() {
  if (!navigator.onLine || !cfg || syncing) return;
  api('state').then(function (res) {
    server = res; save('bs_server', server);
    render();
  }).catch(function (err) { console.error(err); });
}

// ---------- 撤销(两次点击确认) ----------
var undoArmed = null;
$('undoBtn').onclick = function () {
  var s = effective();
  if (!s.recent.length) return;
  var r = s.recent[0];
  if (!undoArmed) {
    $('undoBtn').textContent = '再点一次,撤销「' + r.cat + ' +' + r.count.toLocaleString() + '」';
    undoArmed = setTimeout(function () {
      undoArmed = null;
      $('undoBtn').textContent = '撤销最后一笔';
    }, 3000);
    return;
  }
  clearTimeout(undoArmed); undoArmed = null;
  $('undoBtn').textContent = '撤销最后一笔';

  if (queue.length) {
    // 还没同步出去,直接从本地队列删掉
    queue.pop();
    save('bs_queue', queue);
    toast('已撤销');
    render();
  } else if (navigator.onLine) {
    api('undo').then(function (res) {
      server = res; save('bs_server', server);
      toast('已撤销');
      render();
    }).catch(function () { toast('撤销失败,请重试'); });
  } else {
    toast('这笔已同步,需要有网络才能撤销');
  }
};

// ---------- 复制汇总 ----------
$('copyBtn').onclick = function () {
  var ta = $('summaryText');
  var done = function () { toast('已复制'); };
  var fallback = function () {
    ta.focus(); ta.select(); ta.setSelectionRange(0, ta.value.length);
    try { document.execCommand('copy'); done(); }
    catch (e) { toast('请长按文本框手动复制'); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(done, fallback);
  } else {
    fallback();
  }
};

// ---------- 设置 ----------
function showSetup() {
  $('setupCard').classList.remove('hidden');
  $('main').classList.add('hidden');
  if (cfg) { $('cfgUrl').value = cfg.url; $('cfgToken').value = cfg.token; }
}
function showMain() {
  $('setupCard').classList.add('hidden');
  $('main').classList.remove('hidden');
}
$('settingsBtn').onclick = showSetup;
$('cfgSave').onclick = function () {
  var url = $('cfgUrl').value.trim();
  var token = $('cfgToken').value.trim();
  if (!/^https:\/\/script\.google\.com\/.+\/exec$/.test(url)) { toast('网址应以 /exec 结尾'); return; }
  if (!token) { toast('请填写访问令牌'); return; }
  cfg = { url: url, token: token };
  $('cfgSave').textContent = '连接中…';
  api('state').then(function (res) {
    save('bs_cfg', cfg);
    server = res; save('bs_server', server);
    $('cfgSave').textContent = '保存并连接';
    showMain();
    render();
    flush();
    toast('连接成功');
  }).catch(function (err) {
    $('cfgSave').textContent = '保存并连接';
    toast('连接失败: ' + err.message);
  });
};

// ---------- 启动 ----------
window.addEventListener('online', function () { render(); flush(); });
window.addEventListener('offline', render);
// 午夜跨天时自动刷新界面
setInterval(function () {
  if (render._day !== todayKey()) { render._day = todayKey(); render(); }
}, 30 * 1000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW 注册失败', e); });
}

if (!cfg) {
  showSetup();
} else {
  showMain();
  render();
  flush();
}
</script>
</body>
</html>
